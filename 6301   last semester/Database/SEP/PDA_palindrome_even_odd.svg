<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="380" viewBox="0 0 1200 380">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7"
            refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
    <style>
      .state { fill: none; stroke: #000; stroke-width: 2.2; }
      .accept { fill: none; stroke: #000; stroke-width: 1.6; }
      .edge  { fill: none; stroke: #000; stroke-width: 2; }
      .lbl   { font: 14px Arial, Helvetica, sans-serif; dominant-baseline: middle; text-anchor: middle; }
      .small { font: 12px Arial, Helvetica, sans-serif; }
      .title { font: 12px Arial, Helvetica, sans-serif; fill: #111; }
    </style>
  </defs>

  <!-- Coordinates: I(100,190)  J(380,190)  K(660,190)  F(940,190); state radius R=35 -->

  <!-- Initial arrow -->
  <line x1="20" y1="190" x2="65" y2="190" class="edge" marker-end="url(#arrow)"/>

  <!-- States -->
  <circle cx="100" cy="190" r="35" class="state"/>
  <text x="100" y="190" class="lbl">I</text>

  <circle cx="380" cy="190" r="35" class="state"/>
  <text x="380" y="190" class="lbl">J</text>

  <circle cx="660" cy="190" r="35" class="state"/>
  <text x="660" y="190" class="lbl">K</text>

  <circle cx="940" cy="190" r="35" class="state"/>
  <circle cx="940" cy="190" r="43" class="accept"/>
  <text x="940" y="190" class="lbl">F</text>

  <!-- I -> J -->
  <line x1="135" y1="190" x2="345" y2="190" class="edge" marker-end="url(#arrow)"/>
  <text x="240" y="170" class="lbl">ε, ε → z</text>

  <!-- J loop (push mode) -->
  <path d="M 380 155 C 460 40, 300 40, 380 155" class="edge" marker-end="url(#arrow)"/>
  <text x="380" y="30" class="small" text-anchor="middle" dominant-baseline="middle">Push mode:</text>
  <text x="380" y="48" class="small" text-anchor="middle" dominant-baseline="middle">a,z→az; a,a→aa; a,b→ab</text>
  <text x="380" y="66" class="small" text-anchor="middle" dominant-baseline="middle">b,z→bz; b,a→ba; b,b→bb</text>

  <!-- J -> K (even midpoint) -->
  <path d="M 415 184 Q 520 110, 625 184" class="edge" marker-end="url(#arrow)"/>
  <text x="520" y="95" class="small" text-anchor="middle" dominant-baseline="middle">even: ε, X→X (X∈{a,b,z})</text>

  <!-- J -> K (odd midpoint) -->
  <path d="M 415 196 Q 520 270, 625 196" class="edge" marker-end="url(#arrow)"/>
  <text x="520" y="285" class="small" text-anchor="middle" dominant-baseline="middle">odd: a or b, X→X (no stack change)</text>

  <!-- K loop (compare/pop) -->
  <path d="M 660 155 C 740 40, 580 40, 660 155" class="edge" marker-end="url(#arrow)"/>
  <text x="660" y="30" class="small" text-anchor="middle" dominant-baseline="middle">Compare / pop:</text>
  <text x="660" y="48" class="small" text-anchor="middle" dominant-baseline="middle">a,a→ε;   b,b→ε</text>

  <!-- K -> F -->
  <line x1="695" y1="190" x2="905" y2="190" class="edge" marker-end="url(#arrow)"/>
  <text x="800" y="170" class="lbl">ε, z → ε</text>

  <!-- Caption -->
  <text x="600" y="360" class="title" text-anchor="middle" dominant-baseline="middle">
    NPDA for palindromes over {a,b} (even and odd lengths)
  </text>
</svg>